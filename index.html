<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1714; --cream: #f5f0e8; --warm: #e8dfd0;
    --primary: #c4622d; --primary-light: #d4845a; --primary-pale: #f0ddd3;
    
    --mist: #8a7a72; --error: #b3261e; --success: #c4622d;
  }
  html, body { min-height: 100vh; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream); color: var(--ink);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 20px; position: relative; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; top: -100px; right: -100px;
    width: 500px; height: 500px; border-radius: 50%;
    background: var(--primary-pale); opacity: 0.35; pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; bottom: -80px; left: -80px;
    width: 360px; height: 360px; border-radius: 50%;
    background: var(--warm); opacity: 0.6; pointer-events: none;
  }
  .noise {
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.3;
  }
  .container { position: relative; z-index: 1; width: 100%; max-width: 440px; }
  .logo {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    margin-bottom: 40px; text-decoration: none;
    animation: fadeDown 0.6s ease forwards;
  }
  .logo-icon {
    width: 56px; height: 56px; background: var(--primary); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 700;
    color: white; letter-spacing: -0.02em;
  }
  .logo-name {
    font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 700;
    color: var(--ink); letter-spacing: 0.04em;
  }
  .logo-tagline { font-size: 12px; color: var(--mist); letter-spacing: 0.08em; margin-top: -4px; }
  .card {
    background: white; border: 1px solid rgba(26,23,20,0.08);
    padding: 40px 40px 36px; animation: fadeUp 0.6s ease 0.1s both;
  }
  .card-section { margin-bottom: 0; }
  .card-section + .card-section {
    margin-top: 32px; padding-top: 32px;
    border-top: 1px solid rgba(26,23,20,0.08);
  }
  .section-label {
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--primary); margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-label::after {
    content: ''; display: block; flex: 1; height: 1px;
    background: var(--primary); opacity: 0.2;
  }
  .section-title {
    font-family: 'Shippori Mincho', serif; font-size: 20px;
    font-weight: 600; color: var(--ink); margin-bottom: 6px;
  }
  .section-desc { font-size: 13px; color: var(--mist); line-height: 1.7; font-weight: 300; margin-bottom: 20px; }
  .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  input[type="email"], input[type="password"], input[type="text"] {
    width: 100%; padding: 12px 16px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 300;
    color: var(--ink); background: var(--cream);
    border: 1px solid rgba(26,23,20,0.12); border-radius: 0; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="email"]:focus, input[type="password"]:focus, input[type="text"]:focus {
    border-color: var(--primary); box-shadow: 0 0 0 3px rgba(196,98,45,0.12); background: white;
  }
  input[type="email"]::placeholder, input[type="password"]::placeholder { color: #b0a898; }
  .show-pw {
    display: flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--mist); cursor: pointer;
    user-select: none; margin-top: -2px; margin-bottom: 4px;
  }
  .show-pw input[type="checkbox"] { width: 14px; height: 14px; accent-color: var(--primary); cursor: pointer; }
  .agree {
    display: flex; align-items: flex-start; gap: 10px; margin-bottom: 16px;
    font-size: 13px; color: var(--mist); line-height: 1.6; font-weight: 300;
  }
  .agree input[type="checkbox"] { width: 15px; height: 15px; margin-top: 2px; flex-shrink: 0; accent-color: var(--primary); cursor: pointer; }
  .agree a { color: var(--primary); text-decoration: none; }
  .agree a:hover { text-decoration: underline; }
  .btn-primary {
    width: 100%; padding: 13px 24px; background: var(--primary); color: white;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 400;
    letter-spacing: 0.04em; border: none; cursor: pointer;
    transition: background 0.2s, transform 0.15s; margin-top: 4px;
  }
  .btn-primary:hover:not(:disabled) { background: var(--ink); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .msg { font-size: 13px; line-height: 1.5; min-height: 1.3em; margin-top: 8px; font-weight: 300; }
  .msg.error { color: var(--error); }
  .msg.success { color: var(--success); }
  .foot {
    margin-top: 28px; text-align: center; font-size: 12px;
    color: var(--mist); line-height: 1.7; font-weight: 300;
    animation: fadeUp 0.6s ease 0.25s both;
  }
  .foot a { color: var(--primary); text-decoration: none; }
  .foot-links { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 12px; }
  .foot-links a { color: var(--mist); font-size: 11px; letter-spacing: 0.04em; text-decoration: none; transition: color 0.2s; }
  .foot-links a:hover { color: var(--primary); }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @media (max-width: 480px) { body { padding: 32px 16px; } .card { padding: 28px 24px 28px; } .logo { margin-bottom: 32px; } }

/* PWA インストールバナー */
.pwa-banner{display:none;align-items:center;gap:12px;background:white;border:1px solid rgba(196,98,45,.2);border-left:4px solid var(--primary);padding:14px 16px;margin-bottom:20px;position:relative;animation:fadeUp .4s ease}
.pwa-banner.show{display:flex}
.pwa-banner-icon{font-size:22px;flex-shrink:0}
.pwa-banner-body{flex:1;min-width:0}
.pwa-banner-title{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px}
.pwa-banner-desc{font-size:12px;color:var(--mist);font-weight:300;line-height:1.5}
.pwa-banner-btn{background:var(--primary);color:white;border:none;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .2s}
.pwa-banner-btn:hover{background:var(--ink)}
.pwa-banner-close{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--mist);font-size:16px;cursor:pointer;padding:2px 6px;line-height:1;transition:color .2s}
.pwa-banner-close:hover{color:var(--ink)}
/* PWA 手順モーダル */
.pwa-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-end;justify-content:center;padding:0}
.pwa-modal-overlay.show{display:flex}
.pwa-modal{background:white;width:min(480px,100vw);padding:28px 24px 32px;border-top-left-radius:16px;border-top-right-radius:16px;border-top:4px solid var(--primary);animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.pwa-modal-title{font-family:'Shippori Mincho',serif;font-size:18px;font-weight:600;color:var(--ink);margin-bottom:6px}
.pwa-modal-sub{font-size:13px;color:var(--mist);font-weight:300;margin-bottom:20px;line-height:1.6}
.pwa-steps{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.pwa-step{display:flex;align-items:flex-start;gap:12px}
.pwa-step-num{width:24px;height:24px;border-radius:50%;background:var(--primary);color:white;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.pwa-step-text{font-size:13px;color:var(--ink);line-height:1.7;font-weight:300}
.pwa-step-text strong{font-weight:500;color:var(--primary)}
.pwa-modal-close{width:100%;padding:12px;background:var(--warm);border:none;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--mist);cursor:pointer;transition:background .2s}
.pwa-modal-close:hover{background:var(--ink);color:white}
  
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div class="noise"></div>
<!-- PWA バナー -->
<div id="pwaBanner" class="pwa-banner">
  <div class="pwa-banner-icon">📱</div>
  <div class="pwa-banner-body">
    <div class="pwa-banner-title">アプリとして使う</div>
    <div class="pwa-banner-desc">ホーム画面に追加するとアプリのように使えます</div>
  </div>
  <button class="pwa-banner-btn" id="pwaBannerBtn">追加する</button>
  <button class="pwa-banner-close" id="pwaBannerClose">×</button>
</div>
<!-- PWA 手順モーダル -->
<div id="pwaModal" class="pwa-modal-overlay">
  <div class="pwa-modal">
    <div class="pwa-modal-title">📱 ホーム画面に追加</div>
    <div class="pwa-modal-sub" id="pwaModalSub"></div>
    <div class="pwa-steps" id="pwaSteps"></div>
    <button class="pwa-modal-close" id="pwaModalClose">閉じる</button>
  </div>
</div>
<div class="container">
  <a href="/" class="logo">
    <img src="https://app.honneroom.com/assets/icon.png" alt="本音ルーム" style="width:56px;height:56px;object-fit:contain">
    <span class="logo-name">本音ルーム</span>
    <span class="logo-tagline">本音を、安心して話せる場所。</span>
  </a>
  <div class="card">
    <div class="card-section">
      <div class="section-label">Login</div>
      <h2 class="section-title">ログイン</h2>
      <p class="section-desc">パスワードを設定済みの方はこちら。</p>
      <div class="field">
        <input id="pw-email" type="email" placeholder="メールアドレス" autocomplete="email">
        <input id="pw-password" type="password" placeholder="パスワード" autocomplete="current-password">
        <label class="show-pw">
          <input type="checkbox" id="show-password"> パスワードを表示
        </label>
      </div>
      <button id="btn-login-pw" class="btn-primary">ログイン</button>
      <p id="pw-message" class="msg" aria-live="polite"></p>
    </div>
    <div class="card-section">
      <div class="section-label">Register / Reset</div>
      <h2 class="section-title">新規登録 / パスワード再設定</h2>
      <p class="section-desc">メールアドレスを認証してアカウントを作成します。すでにアカウントがある場合、同じ手順でパスワード再設定へ進めます。</p>
      <label class="agree">
        <input type="checkbox" id="agree">
        <span>
          <a href="https://honneroom.com/terms.html" target="_blank" rel="noopener">利用規約</a>および
          <a href="https://honneroom.com/privacy.html" target="_blank" rel="noopener">プライバシーポリシー</a>を読んで同意しました。また、本サービスは女性を対象としており、女性であることに同意します。
        </span>
      </label>
      <div class="field">
        <input id="magic-email" type="email" placeholder="メールアドレス" autocomplete="email">
      </div>
      <button id="btn-magic" class="btn-primary" disabled>認証メールを送る</button>
      <p id="magic-message" class="msg" aria-live="polite"></p>
    </div>
  </div>
  <div class="foot">
    <p>メールが届かない場合は、迷惑メールフォルダもご確認ください。</p>
    <div class="foot-links">
      <a href="https://honneroom.com/terms.html" target="_blank" rel="noopener">利用規約</a>
      <a href="https://honneroom.com/privacy.html" target="_blank" rel="noopener">プライバシーポリシー</a>
      <a href="https://honneroom.com/legal.html" target="_blank" rel="noopener">特定商取引法に基づく表記</a>
      <a href="https://honneroom.com/contact.html" target="_blank" rel="noopener">お問い合わせ</a>
    </div>
  </div>
</div>
<script>
  const SUPABASE_URL = "https://rhynpigqhnbwjyudvvfw.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJoeW5waWdxaG5id2p5dWR2dmZ3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc3ODcyNTMsImV4cCI6MjA4MzM2MzI1M30.S9h-SH0JB0cEhMukUUaOuYEetx2I8qecZapIeCpk57M";
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
  });
  const TXT = {
    needEmail: "メールアドレスを入力してください。",
    needPassword: "パスワードを入力してください。",
    needAgree: "利用規約とプライバシーポリシーへの同意が必要です。",
    invalidEmail: "メールアドレスの形式が正しくありません。",
    sent: "認証メールを送信しました。メール内のリンクから続行してください。",
    pwLoginFailed: "ログインに失敗しました。メールアドレスまたはパスワードをご確認ください。",
    errorPrefix: "エラー：",
  };
  const $ = (s) => document.querySelector(s);
  const agreeCheckbox = $("#agree");
  const magicBtn = $("#btn-magic");
  const pwLoginBtn = $("#btn-login-pw");
  const pwMsg = $("#pw-message");
  const magicMsg = $("#magic-message");
  function showMsg(el, text, type = "error") {
    if (!el) return; el.textContent = text || "";
    el.classList.remove("error", "success"); if (text) el.classList.add(type);
  }
  function validateEmail(email) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email); }
  agreeCheckbox.addEventListener("change", () => { magicBtn.disabled = !agreeCheckbox.checked; });
  const showPw = $("#show-password"); const pwField = $("#pw-password");
  showPw.addEventListener("change", () => { pwField.type = showPw.checked ? "text" : "password"; });
  $("#pw-email").addEventListener("input", () => showMsg(pwMsg, ""));
  $("#pw-password").addEventListener("input", () => showMsg(pwMsg, ""));
  $("#magic-email").addEventListener("input", () => showMsg(magicMsg, ""));
  pwLoginBtn.onclick = async () => {
    const email = $("#pw-email").value.trim(); const password = $("#pw-password").value;
    showMsg(pwMsg, "");
    if (!email) { showMsg(pwMsg, TXT.needEmail); return; }
    if (!validateEmail(email)) { showMsg(pwMsg, TXT.invalidEmail); return; }
    if (!password) { showMsg(pwMsg, TXT.needPassword); return; }
    pwLoginBtn.disabled = true;
    const { error } = await sb.auth.signInWithPassword({ email, password });
    pwLoginBtn.disabled = false;
    if (error) { showMsg(pwMsg, TXT.pwLoginFailed); return; }
    try { gtag('event', 'login_success', { method: 'password' }); } catch(e) {}
    window.location.href = `/app.html`;
  };
  magicBtn.onclick = async () => {
    const email = $("#magic-email").value.trim();
    showMsg(magicMsg, "");
    if (!email) { showMsg(magicMsg, TXT.needEmail); return; }
    if (!validateEmail(email)) { showMsg(magicMsg, TXT.invalidEmail); return; }
    if (!agreeCheckbox.checked) { showMsg(magicMsg, TXT.needAgree); return; }
    magicBtn.disabled = true;
    const { error } = await sb.auth.signInWithOtp({
      email, options: { shouldCreateUser: true, emailRedirectTo: `https://app.honneroom.com/app.html` }
    });
    magicBtn.disabled = false;
    if (error) { showMsg(magicMsg, TXT.errorPrefix + error.message); }
    else { showMsg(magicMsg, TXT.sent, "success"); }
  };
</script>
  
<!-- Service Worker 登録 + PWAバナー -->
<script>
  // Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('SW registered:', reg.scope))
        .catch(err => console.warn('SW registration failed:', err));
    });
  }

  // PWAバナー制御
  let deferredPrompt = null;
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandaloneMode = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  const dismissed = sessionStorage.getItem('pwaBannerDismissed');

  if (!isInStandaloneMode && !dismissed) {
    // Android/PC: インストールイベントを捕捉
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('pwaBanner').classList.add('show');
    });
    // iOS: 常にバナー表示
    if (isIOS) {
      document.getElementById('pwaBanner').classList.add('show');
    }
  }

  document.getElementById('pwaBannerBtn').addEventListener('click', () => {
    if (deferredPrompt) {
      // Android/PC: ネイティブインストールダイアログ
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
    } else {
      // iOS: 手順モーダルを表示
      const isChrome = /chrome/i.test(navigator.userAgent) && !/edg/i.test(navigator.userAgent);
      document.getElementById('pwaModalSub').textContent = isIOS
        ? 'Safariで以下の手順でホーム画面に追加できます。'
        : 'ブラウザの手順でホーム画面に追加できます。';
      document.getElementById('pwaSteps').innerHTML = isIOS ? `
        <div class="pwa-step"><div class="pwa-step-num">1</div><div class="pwa-step-text">画面下の<strong>共有ボタン（□↑）</strong>をタップ</div></div>
        <div class="pwa-step"><div class="pwa-step-num">2</div><div class="pwa-step-text">メニューをスクロールして<strong>「ホーム画面に追加」</strong>をタップ</div></div>
        <div class="pwa-step"><div class="pwa-step-num">3</div><div class="pwa-step-text"><strong>「追加」</strong>をタップして完了！</div></div>
      ` : `
        <div class="pwa-step"><div class="pwa-step-num">1</div><div class="pwa-step-text">ブラウザ右上の<strong>メニュー（⋮）</strong>をタップ</div></div>
        <div class="pwa-step"><div class="pwa-step-num">2</div><div class="pwa-step-text"><strong>「アプリをインストール」</strong>をタップ</div></div>
        <div class="pwa-step"><div class="pwa-step-num">3</div><div class="pwa-step-text"><strong>「インストール」</strong>をタップして完了！</div></div>
      `;
      document.getElementById('pwaModal').classList.add('show');
    }
  });

  document.getElementById('pwaBannerClose').addEventListener('click', () => {
    document.getElementById('pwaBanner').classList.remove('show');
    sessionStorage.setItem('pwaBannerDismissed', '1');
  });
  document.getElementById('pwaModalClose').addEventListener('click', () => {
    document.getElementById('pwaModal').classList.remove('show');
  });
  document.getElementById('pwaModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('pwaModal'))
      document.getElementById('pwaModal').classList.remove('show');
  });
</script>
  
</body>
</html>
