<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>本音ルーム</title>
<link rel="icon" type="image/png" href="/assets/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-XXXXXXXXXX', { linker: { domains: ['honneroom.com','app.honneroom.com'] } });
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1714;--cream:#f5f0e8;--warm:#e8dfd0;
  --primary:#c4622d;--primary-light:#d4845a;--primary-pale:#f0ddd3;
  
  --mist:#8a7a72;--error:#b3261e;
  --hh:60px;--nh:48px;
}
html,body{min-height:100vh}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);padding-top:calc(var(--hh) + var(--nh))}

/* HEADER */
.site-header{position:fixed;top:0;left:0;right:0;height:var(--hh);z-index:100;background:rgba(245,240,232,.96);backdrop-filter:blur(12px);border-bottom:1px solid rgba(26,23,20,.08);display:flex;align-items:center;padding:0 20px;justify-content:space-between}
.hlogo{display:flex;align-items:center;gap:9px;text-decoration:none}
.hlogo img{width:30px;height:30px;object-fit:contain}
.hlogo-name{font-family:'Shippori Mincho',serif;font-size:15px;font-weight:600;color:var(--ink)}
.hright{display:flex;align-items:center;gap:10px}
.uemail{font-size:12px;color:var(--mist);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pbadge{font-size:10px;padding:3px 9px;background:var(--primary-pale);color:var(--primary);letter-spacing:.06em}
.pbadge.std{background:var(--primary);color:white}
.btn-out{font-size:12px;color:var(--mist);background:none;border:1px solid rgba(26,23,20,.12);padding:5px 11px;cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.btn-out:hover{color:var(--ink);border-color:var(--ink)}
.notif-btn{position:relative;background:none;border:none;cursor:pointer;padding:4px 6px;color:var(--mist);font-size:18px;line-height:1;transition:color .2s}
.notif-btn:hover{color:var(--primary)}
.notif-badge{position:absolute;top:0;right:0;background:var(--primary);color:white;font-size:9px;font-weight:600;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px;pointer-events:none}
.notif-badge.hidden{display:none}

/* TAB NAV — HOME / マイページ / 設定 の3タブ */
.tab-nav{position:fixed;top:var(--hh);left:0;right:0;height:var(--nh);z-index:99;background:white;border-bottom:1px solid rgba(26,23,20,.08);display:flex;align-items:stretch}
.tab-btn{flex:1;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--mist);cursor:pointer;position:relative;transition:color .2s}
.tab-btn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--primary);transform:scaleX(0);transition:transform .2s}
.tab-btn.active{color:var(--primary)}
.tab-btn.active::after{transform:scaleX(1)}

/* PAGE */
.page{max-width:680px;margin:0 auto;padding:24px 16px 80px}
.tab-pane{display:none}
.tab-pane.active{display:block}

/* SEARCH & FILTERS */
.search-bar{display:flex;gap:8px;margin-bottom:14px}
.s-input{flex:1;padding:9px 14px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:300;color:var(--ink);background:white;border:1px solid rgba(26,23,20,.12);outline:none;transition:border-color .2s,box-shadow .2s}
.s-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(196,98,45,.1)}
.s-input::placeholder{color:#b0a898}
.s-clear{font-size:12px;color:var(--mist);background:none;border:none;cursor:pointer;padding:8px 10px;font-family:'DM Sans',sans-serif;white-space:nowrap}
.s-clear:hover{color:var(--primary)}
.type-filter{display:flex;border:1px solid rgba(26,23,20,.10);background:white;margin-bottom:14px}
.type-btn{flex:1;padding:9px;font-size:12px;letter-spacing:.06em;text-align:center;cursor:pointer;border:none;background:none;color:var(--mist);font-family:'DM Sans',sans-serif;transition:all .2s;border-right:1px solid rgba(26,23,20,.08)}
.type-btn:last-child{border-right:none}
.type-btn.active{background:#7a5c4a;color:white}
.cat-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-chip{font-size:11px;padding:5px 12px;border:1px solid rgba(26,23,20,.12);background:white;color:var(--mist);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif;letter-spacing:.04em}
.cat-chip.active{background:var(--primary);color:white;border-color:var(--primary)}
.cat-chip:hover:not(.active){border-color:var(--primary);color:var(--primary)}

/* AVATAR */
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:white;flex-shrink:0;margin-top:1px;overflow:hidden}
img.av{object-fit:cover;display:block}

/* CARDS */
.card-list{display:flex;flex-direction:column;gap:2px}
.post-card{background:white;padding:16px 20px;border:1px solid rgba(26,23,20,.06);border-left:4px solid transparent;cursor:pointer;transition:all .2s}
.post-card:hover{border-color:rgba(26,23,20,.14);transform:translateX(2px)}
/* つぶやき */
.post-card.is-post{border-left-color:var(--primary)}
/* 相談 */
.post-card.is-question{border-left-color:#7a5c4a}
/* タイプバッジ */
.type-label{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 10px;letter-spacing:.04em;margin-bottom:8px;border-radius:2px}
.type-label-post{background:var(--primary);color:white}
.type-label-q{background:#5c3d28;color:white}
.card-meta{display:flex;align-items:flex-start;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.av-info{min-width:0;flex:1}
.uname{font-size:12px;color:var(--ink)}
/* ユーザー名クリック可能 */
.uname-link{font-size:12px;color:var(--primary);cursor:pointer;text-decoration:none;font-weight:400}
.uname-link:hover{text-decoration:underline}
.attr-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.attr-tag{font-size:10px;padding:2px 6px;background:var(--warm);color:var(--mist)}
/* つぶやきバッジ: 塗り */
.tbadge-post{font-size:10px;padding:3px 9px;background:var(--primary);color:white;letter-spacing:.04em;align-self:flex-start;font-weight:500}
/* 相談バッジ: アウトライン */
.tbadge-q{font-size:10px;padding:3px 9px;background:white;color:#7a5c4a;border:1px solid #7a5c4a;letter-spacing:.04em;align-self:flex-start;font-weight:500}
.cat-tag{font-size:10px;padding:2px 8px;background:var(--warm);color:var(--mist);letter-spacing:.04em;align-self:flex-start}
.card-title{font-family:'Shippori Mincho',serif;font-size:15px;font-weight:600;line-height:1.5;margin-bottom:6px}
.card-preview{font-size:13px;color:var(--mist);line-height:1.7;font-weight:300;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:0}
.post-card.is-post .card-preview{-webkit-line-clamp:4;color:#4a4440;font-size:14px}
.post-card.is-question .card-preview{-webkit-line-clamp:3;color:#4a4440}
.card-footer{display:flex;align-items:center;gap:12px;margin-top:10px;font-size:11px;color:var(--mist);flex-wrap:wrap}
.solved{color:var(--primary)}

/* REACTIONS */
.react-row-sm{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px;padding-top:10px;padding-bottom:14px;border-top:1px solid rgba(26,23,20,.05)}
.rbtn-sm{display:inline-flex;align-items:center;gap:3px;font-size:12px;padding:4px 8px;background:var(--cream);border:1px solid rgba(26,23,20,.08);cursor:pointer;transition:all .15s;color:var(--mist);font-family:'DM Sans',sans-serif;line-height:1}
.rbtn-sm:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-pale)}
.rbtn-sm.on{background:var(--primary-pale);border-color:var(--primary);color:var(--primary)}
.rcount{font-size:11px}
.react-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid rgba(26,23,20,.06)}
.rbtn{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:5px 10px;background:var(--cream);border:1px solid rgba(26,23,20,.10);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s;color:var(--ink)}
.rbtn:hover{border-color:var(--primary);background:var(--primary-pale)}
.rbtn.on{background:var(--primary-pale);border-color:var(--primary);color:var(--primary)}
.rcount2{font-size:11px;color:var(--mist)}

/* DETAIL VIEW */
.detail-view{display:none}
.detail-view.show{display:block}
.back-btn{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--mist);background:none;border:none;cursor:pointer;padding:0;margin-bottom:20px;font-family:'DM Sans',sans-serif;transition:color .2s}
.back-btn:hover{color:var(--primary)}
.dcard{background:white;border:1px solid rgba(26,23,20,.06);padding:24px;margin-bottom:2px}
.dtitle{font-family:'Shippori Mincho',serif;font-size:20px;font-weight:600;line-height:1.55;margin-bottom:14px}
.dbody{font-size:14px;line-height:1.9;color:#4a4440;font-weight:300;white-space:pre-wrap}
.dfooter{display:flex;align-items:center;gap:14px;margin-top:14px;flex-wrap:wrap;font-size:11px;color:var(--mist)}
.replies-wrap{margin-top:2px}
.rcard{background:white;border:1px solid rgba(26,23,20,.06);padding:18px 20px;margin-bottom:2px;position:relative}
.rcard.best{border-color:var(--primary);background:linear-gradient(135deg,#fdf3ee 0%,#fff 60%);box-shadow:0 2px 12px rgba(196,98,45,.12)}
.rcard.best::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--primary)}
.best-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;letter-spacing:.06em;background:var(--primary);color:white;padding:5px 12px;margin-bottom:10px}
.rbody{font-size:14px;line-height:1.8;color:#4a4440;font-weight:300;white-space:pre-wrap;margin-top:10px}
.reply-form-box{background:white;border:1px solid rgba(26,23,20,.06);padding:20px;margin-top:2px}
.reply-form-lbl{font-size:12px;color:var(--mist);letter-spacing:.06em;margin-bottom:10px}

/* ベストアンサー確認モーダル */
.best-confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.best-confirm-box{background:white;width:min(420px,94vw);padding:28px;border-top:4px solid var(--primary)}
.best-confirm-title{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:600;margin-bottom:10px;color:var(--ink)}
.best-confirm-body{font-size:13px;color:var(--mist);line-height:1.8;margin-bottom:6px;font-weight:300}
.best-confirm-preview{font-size:13px;color:var(--ink);background:var(--cream);padding:12px 14px;margin:12px 0;line-height:1.7;border-left:3px solid var(--primary);font-weight:300;max-height:80px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.best-confirm-warn{font-size:12px;color:var(--primary);margin-bottom:18px}
.best-confirm-btns{display:flex;gap:8px;flex-wrap:wrap}

/* 投稿フォーム（HOME内） */
.post-form-area{margin-bottom:20px}
.form-tabs{display:flex;border:1px solid rgba(26,23,20,.10);background:white;margin-bottom:0}
.form-tab-btn{flex:1;padding:10px;font-size:12px;letter-spacing:.06em;text-align:center;cursor:pointer;border:none;background:none;color:var(--mist);font-family:'DM Sans',sans-serif;transition:all .2s;border-right:1px solid rgba(26,23,20,.08)}
.form-tab-btn:last-child{border-right:none}
.form-tab-btn.active{background:var(--primary);color:white}
.form-panel{background:white;border:1px solid rgba(26,23,20,.06);border-top:none;padding:20px;display:none}
.form-panel.active{display:block}
.upgrade-box{background:var(--warm);padding:16px 20px;font-size:13px;color:var(--ink);font-weight:300;line-height:1.7;border:1px solid rgba(26,23,20,.06);border-top:none}
.upgrade-box a{color:var(--primary);text-decoration:none;font-weight:400}

/* FORMS */
.pform-wrap{background:white;border:1px solid rgba(26,23,20,.06);padding:26px;margin-bottom:2px}
.form-lbl-line{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.form-lbl-line::after{content:'';flex:1;height:1px;background:var(--primary);opacity:.2}
.fg{margin-bottom:16px}
.flbl{display:block;font-size:11px;color:var(--mist);letter-spacing:.06em;margin-bottom:6px;text-transform:uppercase}
.fi,.fsel,.fta{width:100%;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;color:var(--ink);background:var(--cream);border:1px solid rgba(26,23,20,.12);outline:none;transition:border-color .2s,box-shadow .2s;border-radius:0;-webkit-appearance:none}
.fi:focus,.fsel:focus,.fta:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(196,98,45,.1);background:white}
.fta{resize:vertical;min-height:120px;line-height:1.7}
.fsel{cursor:pointer}
.ccount{font-size:11px;color:var(--mist);text-align:right;margin-top:3px}
.req{color:var(--primary)}

/* DELETE / REPORT */
.del-btn{font-size:11px;color:var(--mist);background:none;border:none;cursor:pointer;padding:0 0 0 6px;font-family:'DM Sans',sans-serif;flex-shrink:0;transition:color .2s}
.del-btn:hover{color:var(--error)}
.report-btn{font-size:11px;color:var(--mist);background:none;border:none;cursor:pointer;padding:0 0 0 6px;font-family:'DM Sans',sans-serif;flex-shrink:0;transition:color .2s}
.report-btn:hover{color:var(--primary)}
.btn-best{font-size:11px;color:var(--mist);background:none;border:1px solid rgba(26,23,20,.12);padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;white-space:nowrap;flex-shrink:0}
.btn-best:hover{border-color:var(--primary);color:var(--primary)}

/* BUTTONS */
.btn-p{background:var(--primary);color:white;border:none;padding:12px 32px;font-family:'DM Sans',sans-serif;font-size:14px;letter-spacing:.04em;cursor:pointer;transition:all .2s}
.btn-p:hover:not(:disabled){background:var(--ink);transform:translateY(-1px)}
.btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-s{background:transparent;color:var(--primary);border:1px solid var(--primary);padding:11px 26px;font-family:'DM Sans',sans-serif;font-size:14px;letter-spacing:.04em;cursor:pointer;transition:all .2s}
.btn-s:hover{background:var(--primary);color:white}
.btn-d{background:transparent;color:var(--error);border:1px solid var(--error);padding:11px 26px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .2s}
.btn-d:hover{background:var(--error);color:white}
.fmsg{font-size:13px;margin-top:10px;font-weight:300}
.fmsg.err{color:var(--error)}
.fmsg.ok{color:var(--primary)}

/* ACCOUNT */
.asec{background:white;border:1px solid rgba(26,23,20,.06);padding:24px;margin-bottom:2px}
.asec-h{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:600;color:var(--ink);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid rgba(26,23,20,.08)}
.plan-box{background:var(--warm);padding:14px 18px;margin-bottom:12px}
.plan-box-lbl{font-size:11px;color:var(--mist);letter-spacing:.04em;margin-bottom:3px}
.plan-box-val{font-family:'Shippori Mincho',serif;font-size:20px;font-weight:600}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.pwf{max-width:300px;display:flex;flex-direction:column;gap:8px;margin-top:10px}

/* ICON PICKER */
.av-upload-wrap{display:flex;align-items:center;gap:16px;margin-bottom:8px}
.av-preview-lg{width:72px;height:72px;border-radius:50%;overflow:hidden;border:3px solid var(--primary-pale);background:var(--warm);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.av-preview-lg img{width:100%;height:100%;object-fit:cover}
.btn-av{font-size:12px;color:var(--primary);background:none;border:1px solid var(--primary);padding:6px 14px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.btn-av:hover{background:var(--primary);color:white}
.icon-picker-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:14px 0}
@media(max-width:400px){.icon-picker-grid{grid-template-columns:repeat(4,1fr)}}
.icon-option{position:relative;cursor:pointer}
.icon-option input[type=radio]{position:absolute;opacity:0;width:0;height:0}
.icon-option img{width:100%;aspect-ratio:1;border-radius:50%;border:3px solid transparent;transition:all .2s;display:block;background:var(--warm)}
.icon-option input[type=radio]:checked+img{border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-pale)}
.icon-option img:hover{border-color:var(--mist)}

/* NOTIFICATION DRAWER */
.notif-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;display:none}
.notif-overlay.show{display:block}
.notif-drawer{position:fixed;top:var(--hh);right:0;width:min(380px,96vw);height:calc(100vh - var(--hh));background:var(--cream);z-index:201;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;border-left:1px solid rgba(26,23,20,.08)}
.notif-drawer.show{transform:translateX(0)}
.notif-drawer-head{padding:16px 20px;border-bottom:1px solid rgba(26,23,20,.08);display:flex;align-items:center;justify-content:space-between;background:white;position:sticky;top:0}
.notif-drawer-title{font-family:'Shippori Mincho',serif;font-size:16px;font-weight:600}
.notif-close{background:none;border:none;cursor:pointer;color:var(--mist);font-size:20px;padding:4px 8px;transition:color .2s;font-family:'DM Sans',sans-serif}
.notif-close:hover{color:var(--ink)}
.notif-drawer-body{padding:12px 16px}
.notif-list{display:flex;flex-direction:column;gap:2px}
.notif-card{background:white;padding:14px 16px;border:1px solid rgba(26,23,20,.06);cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:flex-start}
.notif-card:hover{border-color:rgba(196,98,45,.4)}
.notif-card.unread{border-left:3px solid var(--primary);background:#fdf8f5}
.notif-icon{font-size:16px;flex-shrink:0}
.notif-body-inner{flex:1;min-width:0}
.notif-text{font-size:12px;color:var(--ink);line-height:1.6;font-weight:300}
.notif-text strong{font-weight:500}
.notif-time{font-size:11px;color:var(--mist);margin-top:3px}
.notif-read-all{font-size:12px;color:var(--mist);background:none;border:none;cursor:pointer;padding:0;font-family:'DM Sans',sans-serif;text-decoration:underline;margin-bottom:10px;display:block}
.notif-read-all:hover{color:var(--primary)}

/* MODAL (通報) */
.mback{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.mback.show{display:flex}
.modal{background:white;width:min(460px,96vw);padding:26px;position:relative}
.modal-h{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:600;margin-bottom:16px}
.mclose{position:absolute;top:14px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--mist);padding:4px 8px;transition:color .2s}
.mclose:hover{color:var(--ink)}

/* USER PROFILE PAGE */
.user-profile-page{display:none}
.user-profile-page.show{display:block}
.user-prof-card{background:white;border:1px solid rgba(26,23,20,.06);padding:24px;margin-bottom:2px}
.user-prof-av{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:600;color:white;flex-shrink:0;overflow:hidden}
.user-prof-av img{width:100%;height:100%;object-fit:cover}
.user-prof-name{font-family:'Shippori Mincho',serif;font-size:18px;font-weight:600;color:var(--ink);margin-bottom:4px}
.user-prof-bio{font-size:13px;color:var(--mist);line-height:1.7;font-weight:300;margin-top:10px;white-space:pre-wrap}

/* PW NOTICE */
.pw-notice{display:flex;align-items:flex-start;gap:12px;background:#fffbf5;border:1px solid #e8c97a;border-left:4px solid #d4a017;padding:14px 16px;margin-bottom:14px}
.pw-notice-icon{font-size:18px;flex-shrink:0;line-height:1.3}
.pw-notice-body{flex:1;min-width:0}
.pw-notice-title{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:3px}
.pw-notice-text{font-size:12px;color:var(--mist);font-weight:300;line-height:1.6}

/* ===== REACTIONS ===== */
const EMOJIS=["わかる","参考になった","応援してる","つらいね"];
const EICONS={"わかる":"🤝","参考になった":"💡","応援してる":"📣","つらいね":"🤍"};

async function loadReactions(ids){
  if(!ids.length)return;
  // 対象IDのキャッシュをリセット
  for(const id of ids){
    delete S.reactions[id];
    delete S.myReactions[id];
  }
  const{data,error}=await sb.from("reactions").select("reply_id,emoji,user_id").in("reply_id",ids);
  // 409/403はRLSポリシー未設定。エラーでも画面は壊さない
  if(error){return;} // エラー時は静かにスキップ
  for(const r of(data||[])){
    if(!S.reactions[r.reply_id])S.reactions[r.reply_id]={};
    if(!S.reactions[r.reply_id][r.emoji])S.reactions[r.reply_id][r.emoji]={count:0};
    S.reactions[r.reply_id][r.emoji].count++;
    if(S.user&&r.user_id===S.user.id)S.myReactions[r.reply_id]=r.emoji;
  }
}
// 連打防止フラグ
const _reactLock={};
async function toggleReaction(tid,emoji,cb){
  if(!S.user)return;
  const lockKey=`${tid}_${emoji}`;
  if(_reactLock[lockKey])return; // 連打防止
  _reactLock[lockKey]=true;
  try{
    // DBから現在の自分のリアクションを取得
    const{data:existing}=await sb.from("reactions")
      .select("id,emoji")
      .eq("user_id",S.user.id)
      .eq("reply_id",tid);
    const myRow=(existing||[]).find(r=>r.emoji===emoji);
    const otherRow=(existing||[]).find(r=>r.emoji!==emoji);
    if(myRow){
      // 同じ絵文字→削除（トグルoff）
      await sb.from("reactions").delete().eq("id",myRow.id);
    }else{
      // 別の絵文字があれば先に削除
      if(otherRow){
        await sb.from("reactions").delete().eq("id",otherRow.id);
      }
      // upsert（ユニーク制約があるので409にならない）
      await sb.from("reactions").upsert(
        {user_id:S.user.id,reply_id:tid,emoji},
        {onConflict:"user_id,reply_id,emoji"}
      );
    }
    // DBから最新を取り直し
    await loadReactions([tid]);
  }catch(e){
    console.warn("toggleReaction error:",e.message);
  }finally{
    delete _reactLock[lockKey];
  }
  if(cb)cb();
}
function buildReactSm(tid){
  const r=S.reactions[tid]||{};const my=S.myReactions[tid]||null;
  return`<div class="react-row-sm" data-rid="${tid}">`+
    EMOJIS.map(e=>{const i=r[e]||{count:0};const on=(my===e);
      return`<button class="rbtn-sm${on?" on":""}" data-e="${e}" data-tid="${tid}">${EICONS[e]} ${e}${i.count>0?` <span class="rcount">${i.count}</span>`:""}</button>`;
    }).join("")+`</div>`;
}
function buildReactFull(tid){
  const r=S.reactions[tid]||{};const my=S.myReactions[tid]||null;
  return`<div class="react-row" data-rid="${tid}">`+
    EMOJIS.map(e=>{const i=r[e]||{count:0};const on=(my===e);
      return`<button class="rbtn${on?" on":""}" data-e="${e}" data-tid="${tid}">${EICONS[e]} ${e}${i.count>0?` <span class="rcount2">${i.count}</span>`:""}</button>`;
    }).join("")+`</div>`;
}
function bindReactsSm(container){
  container.querySelectorAll(".rbtn-sm").forEach(b=>{
    b.addEventListener("click",e=>{
      e.stopPropagation();if(!S.user)return;
      const tid=b.dataset.tid,emoji=b.dataset.e;
      toggleReaction(tid,emoji,()=>{
        const row=container.querySelector(`.react-row-sm[data-rid="${tid}"]`);
        if(row){const d=document.createElement("div");d.innerHTML=buildReactSm(tid);row.replaceWith(d.firstChild);bindReactsSm(container);}
      });
    });
  });
}

/* ===== 通知ドロワー ===== */
async function loadNotifications(){
  if(!S.user)return;
  // notif_typeを含まないシンプルSELECTでまず取得
  // notif_type込みのシンプルSELECTでバッジ更新
  const{data:simple,error:e1}=await sb.from("notifications")
    .select("id,is_read,created_at,thread_id,reply_id,notif_type")
    .eq("user_id",S.user.id)
    .order("created_at",{ascending:false}).limit(50);
  if(e1){console.error("loadNotifications error:",JSON.stringify(e1));return;}
  // join付きで詳細取得（ドロワー表示用。失敗してもシンプル結果を使う）
  const{data:full,error:e2}=await sb.from("notifications")
    .select(`id,is_read,created_at,thread_id,reply_id,notif_type,
      threads!thread_id(title,body,type),
      replies!reply_id(body,profiles!user_id(display_name))`)
    .eq("user_id",S.user.id)
    .order("created_at",{ascending:false}).limit(50);
  if(e2){console.warn("loadNotifications full error:",JSON.stringify(e2));}
  S.notifications=(full||simple||[]);
  S.unreadCount=(simple||[]).filter(n=>!n.is_read).length;
  updateNotifBadge();
}
function updateNotifBadge(){
  const badge=$("#notifBadge");if(!badge)return;
  if(S.unreadCount>0){badge.textContent=S.unreadCount>99?"99+":S.unreadCount;badge.classList.remove("hidden");}
  else badge.classList.add("hidden");
}
async function openNotifDrawer(){
  $("#notifOverlay").classList.add("show");
  $("#notifDrawer").classList.add("show");
  // 毎回最新を取得してから表示
  await loadNotifications();
  renderNotifDrawer();
  // 既読処理
  const unreadIds=S.notifications.filter(n=>!n.is_read).map(n=>n.id);
  if(unreadIds.length){
    await sb.from("notifications").update({is_read:true}).in("id",unreadIds);
    S.notifications=S.notifications.map(n=>({...n,is_read:true}));
    S.unreadCount=0;updateNotifBadge();
  }
}
function closeNotifDrawer(){
  $("#notifOverlay").classList.remove("show");
  $("#notifDrawer").classList.remove("show");
}
function renderNotifDrawer(){
  const body=$("#notifDrawerBody");
  if(!S.notifications.length){
    body.innerHTML=`<div class="empty"><div class="empty-h">通知はありません</div></div>`;return;
  }
  let html=`<div class="notif-list">`;
  html+=S.notifications.map(n=>{
    const who=n.replies?.profiles?.display_name||"誰か";
    const th=n.threads;
    const title=th?.title||(th?.body?.slice(0,20)+"…")||"投稿";
    const isBest=(n.notif_type||"")==="best_answer";
    return`<div class="notif-card${n.is_read?"":" unread"}" data-tid="${n.thread_id}" data-type="${th?.type||'question'}">
      <div class="notif-icon">${isBest?"🏆":"💬"}</div>
      <div class="notif-body-inner">
        <div class="notif-text">${isBest
          ?`「${esc(title)}」への返信が<strong>ベストアンサーに選ばれました！</strong>`
          :`<strong>${esc(who)}</strong>さんが「${esc(title)}」に返信しました`
        }</div>
        <div class="notif-time">${rtime(n.created_at)}</div>
      </div>
    </div>`;
  }).join("")+`</div>`;
  body.innerHTML=html;
  body.querySelectorAll(".notif-card").forEach(card=>{
    card.addEventListener("click",()=>{
      closeNotifDrawer();
      switchTab("home");
      setTimeout(()=>openDetail(card.dataset.tid,card.dataset.type),80);
    });
  });
}
$("#btnNotif").addEventListener("click",openNotifDrawer);
$("#notifCloseBtn").addEventListener("click",closeNotifDrawer);
$("#notifOverlay").addEventListener("click",closeNotifDrawer);

function filterT(arr,q){
  if(!q)return arr;const lq=q.toLowerCase();
  return arr.filter(t=>(t.title||"").toLowerCase().includes(lq)||(t.body||"").toLowerCase().includes(lq)||(t.category||"").toLowerCase().includes(lq));
}

/* ===== CARD HTML ===== */
function cardHtml(t,showBadge){
  const p=t.profiles||{};p._uid=t.user_id;
  const label=p.display_name||(p.age?`${p.age}歳`:"匿名");
  const rc=t.replies?.[0]?.count??0;
  const isPost=t.type==="post";
  const isOwn=S.user?.id===t.user_id;
  return`<div class="post-card${isPost?" is-post":" is-question"}" data-id="${t.id}" data-type="${t.type}">
    <div class="card-meta">
      <div class="av-click" data-uid="${t.user_id}" style="cursor:pointer" title="${esc(label)}のプロフィールを見る">
        ${avatarHtml(p,28)}
      </div>
      <div class="av-info">
        <span class="uname-link av-click" data-uid="${t.user_id}">${esc(label)}</span>
        <div class="attr-tags">${attrHtml(p)}</div>
      </div>
      <span class="type-label${isPost?" type-label-post":" type-label-q"}">${isPost?"つぶやき":"相談"}</span>
      ${t.category?`<span class="cat-tag">${esc(t.category)}</span>`:""}
      ${isOwn?`<button class="del-btn" data-id="${t.id}" data-type="thread" title="削除">🗑</button>`:""}
    </div>
    ${!isPost&&t.title?`<div class="card-title">${esc(t.title)}</div>`:""}
    <div class="card-preview">${esc(t.body)}</div>
    <div class="card-footer">
      <span>💬 ${rc}件の返信</span>
      ${t.best_reply_id?`<span class="solved">✓ 解決済み</span>`:""}
      <span>${rtime(t.created_at)}</span>
    </div>
    ${buildReactSm(t.id)}
  </div>`;
}
function bindCardList(container){
  container.querySelectorAll(".post-card").forEach(c=>{
    c.addEventListener("click",e=>{
      if(e.target.closest(".rbtn-sm")||e.target.closest(".del-btn")||e.target.closest(".av-click"))return;
      openDetail(c.dataset.id,c.dataset.type);
    });
  });
  bindReactsSm(container);
  container.querySelectorAll(".av-click").forEach(el=>{
    el.addEventListener("click",e=>{
      e.stopPropagation();
      openUserProfile(el.dataset.uid);
    });
  });
  container.querySelectorAll(".del-btn").forEach(b=>{
    b.addEventListener("click",async e=>{
      e.stopPropagation();
      await deleteThread(b.dataset.id);
    });
  });
}

function showHomeList(){
  $("#homeListView").style.display="";
  $("#homeDetail").classList.remove("show");
  $("#userProfilePage").classList.remove("show");
}

function renderHomeList(){
  const el=$("#homeList");
  let ts=S.threads;
  if(S.homeType)ts=ts.filter(t=>t.type===S.homeType);
  if(S.homeCat)ts=ts.filter(t=>t.category===S.homeCat);
  ts=filterT(ts,S.search);
  if(!ts.length){el.innerHTML=`<div class="empty"><div class="empty-h">該当する投稿がありません</div></div>`;return;}
  const pids=ts.map(t=>t.id); // つぶやき・相談ともにリアクション読み込み
  loadReactions(pids).then(()=>{el.innerHTML=ts.map(t=>cardHtml(t,true)).join("");bindCardList(el);});
}

async function submitPost(){
  const body=$("#ptBody")?.value?.trim();
  const category=$("#ptCat")?.value||"";
  const m=$("#ptMsg");
  if(!S.profile?.display_name){
    msg(m,"投稿する前に「設定」から表示名を設定してください。");
    setTimeout(()=>switchTab("account"),1500);
    return;
  }
  if(!body){msg(m,"内容を入力してください。");return;}
  const btn=$("#btnPostSubmit");btn.disabled=true;
  const{error}=await sb.from("threads").insert({user_id:S.user.id,type:"post",body,title:"",category});
  btn.disabled=false;
  if(error){msg(m,"投稿に失敗しました。");return;}
  msg(m,"投稿しました！","ok");
  $("#ptBody").value="";$("#ptCat").value="";$("#ptCount").textContent="0";
  await loadThreads();renderHomeList();
  setTimeout(()=>{if(m)m.textContent="";},2000);
}
async function submitQuestion(){
  const category=$("#qCatSel")?.value,title=$("#qTitle")?.value?.trim(),body=$("#qBody")?.value?.trim();
  const m=$("#qMsg");
  if(!S.profile?.display_name){
    msg(m,"投稿する前に「設定」から表示名を設定してください。");
    setTimeout(()=>switchTab("account"),1500);
    return;
  }
  if(!category){msg(m,"カテゴリを選択してください。");return;}
  if(!title){msg(m,"タイトルを入力してください。");return;}
  if(!body){msg(m,"内容を入力してください。");return;}
  const btn=$("#btnQSubmit");btn.disabled=true;
  const{error}=await sb.from("threads").insert({user_id:S.user.id,type:"question",category,title,body});
  btn.disabled=false;
  if(error){msg(m,"投稿に失敗しました。");return;}
  msg(m,"投稿しました！","ok");
  $("#qCatSel").value="";$("#qTitle").value="";$("#qBody").value="";
  $("#qTCount").textContent="0";$("#qBCount").textContent="0";
  await loadThreads();renderHomeList();
  setTimeout(()=>{if(m)m.textContent="";},2000);
}

/* ===== 詳細 ===== */
async function openDetail(threadId,type){
  $("#homeListView").style.display="none";
  $("#userProfilePage").classList.remove("show");
  const dv=$("#homeDetail");dv.classList.add("show");
  dv.innerHTML=`<button class="back-btn" id="backBtn">← 一覧に戻る</button><div class="loading">読み込み中…</div>`;
  dv.querySelector("#backBtn").addEventListener("click",showHomeList);

  const{data:t}=await sb.from("threads")
    .select(`id,type,category,title,body,created_at,best_reply_id,user_id,profiles!user_id(display_name,age,work_style,marital_status,living_situation,avatar_url,bio)`)
    .eq("id",threadId).single();
  if(!t){dv.innerHTML+=`<div class="empty">投稿が見つかりませんでした。</div>`;return;}

  const isPost=t.type==="post",isOwner=S.user?.id===t.user_id;
  const p={...t.profiles,_uid:t.user_id};
  const label=p.display_name||(p.age?`${p.age}歳`:"匿名");
  await loadReactions([t.id]);

  let html=`<button class="back-btn" id="backBtn2">← 一覧に戻る</button>
  <div class="dcard">
    <div class="card-meta">
      <div class="av-click" data-uid="${t.user_id}" style="cursor:pointer">${avatarHtml(p,32)}</div>
      <div class="av-info">
        <span class="uname-link av-click" data-uid="${t.user_id}">${esc(label)}</span>
        <div class="attr-tags">${attrHtml(p)}</div>
      </div>
      ${t.category?`<span class="cat-tag">${esc(t.category)}</span>`:""}
      ${S.user&&!isOwner&&S.isStd?`<button class="report-btn" data-type="thread" data-id="${t.id}">通報</button>`:""}
      ${isOwner?`<button class="del-btn" data-id="${t.id}" data-type="thread">🗑 削除</button>`:""}
    </div>
    ${!isPost?`<div class="dtitle">${esc(t.title)}</div>`:""}
    <div class="dbody">${esc(t.body)}</div>
    <div class="dfooter"><span>${rtime(t.created_at)}</span>${t.best_reply_id?`<span class="solved">✓ ベストアンサーあり</span>`:""}</div>
    ${buildReactFull(t.id)}
  </div>`;

  const{data:replies}=await sb.from("replies")
    .select(`*,profiles!user_id(display_name,age,work_style,marital_status,living_situation,avatar_url)`)
    .eq("thread_id",threadId).order("created_at",{ascending:true});
  const rids=(replies||[]).map(r=>r.id);
  await loadReactions(rids);

  html+=`<div class="replies-wrap">`;
  if(!replies?.length){
    html+=`<div style="padding:20px 0;font-size:13px;color:var(--mist);text-align:center">まだ返信がありません。</div>`;
  }else{
    const sorted=[...replies].sort((a,b)=>{
      if(a.id===t.best_reply_id)return-1;if(b.id===t.best_reply_id)return 1;return 0;
    });
    html+=sorted.map(r=>{
      const rp={...r.profiles,_uid:r.user_id};
      const rl=rp.display_name||(rp.age?`${rp.age}歳`:"匿名");
      const isBest=r.id===t.best_reply_id;
      const hasBest=!!t.best_reply_id;
      const canBest=isOwner&&!hasBest&&S.user?.id!==r.user_id;
      const isReplyOwner=S.user?.id===r.user_id;
      return`<div class="rcard${isBest?" best":""}" data-rid="${r.id}">
        ${isBest?`<div class="best-badge">🏆 ベストアンサー</div>`:""}
        <div class="card-meta">
          <div class="av-click" data-uid="${r.user_id}" style="cursor:pointer">${avatarHtml(rp,28)}</div>
          <div class="av-info">
            <span class="uname-link av-click" data-uid="${r.user_id}">${esc(rl)}</span>
            <div class="attr-tags">${attrHtml(rp)}</div>
          </div>
          <span style="font-size:11px;color:var(--mist);margin-left:auto">${rtime(r.created_at)}</span>
          ${canBest&&!isPost?`<button class="btn-best" data-rid="${r.id}">🏆 ベストアンサー</button>`:""}
          ${S.user&&!isReplyOwner&&S.isStd?`<button class="report-btn" data-type="reply" data-id="${r.id}">通報</button>`:""}
          ${isReplyOwner?`<button class="del-btn" data-id="${r.id}" data-type="reply">🗑</button>`:""}
        </div>
        <div class="rbody">${esc(r.body)}</div>
        ${buildReactFull(r.id)}
      </div>`;
    }).join("");
  }
  html+=`</div>`;

  if(!S.user){
    html+=`<div class="reply-form-box"><div class="upgrade-box">返信するには<a href="/">ログイン</a>が必要です。</div></div>`;
  }else if(!S.isStd){
    html+=`<div class="reply-form-box"><div class="upgrade-box">返信するには <span class="upg-link2" style="color:var(--primary);cursor:pointer;font-weight:400">Standardプランへのアップグレード</span>が必要です。</div></div>`;
  }else{
    html+=`<div class="reply-form-box">
      <div class="reply-form-lbl">返信する</div>
      <textarea id="rBody" class="fta" placeholder="返信を入力してください…" maxlength="1000" style="min-height:100px"></textarea>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
        <button id="btnReply" class="btn-p">返信する</button>
        <span class="ccount"><span id="rCount">0</span>/1000</span>
      </div>
      <p id="rMsg" class="fmsg"></p>
    </div>`;
  }

  dv.innerHTML=html;
  dv.querySelector("#backBtn2")?.addEventListener("click",showHomeList);
  dv.querySelectorAll(".report-btn").forEach(b=>bindReport(b));
  dv.querySelectorAll(".av-click").forEach(el=>{
    el.addEventListener("click",e=>{e.stopPropagation();openUserProfile(el.dataset.uid);});
  });
  dv.querySelectorAll(".del-btn").forEach(b=>{
    b.addEventListener("click",async e=>{
      e.stopPropagation();
      if(b.dataset.type==="thread"){
        await deleteThread(b.dataset.id,()=>showHomeList());
      }else{
        await deleteReply(b.dataset.id,threadId,type);
      }
    });
  });

  // ベストアンサーモーダル
  dv.querySelectorAll(".btn-best").forEach(b=>{
    b.addEventListener("click",async e=>{
      e.stopPropagation();
      const rid=b.dataset.rid;
      const replyBody=dv.querySelector(`.rcard[data-rid="${rid}"] .rbody`)?.textContent||"";
      const overlay=document.createElement("div");
      overlay.className="best-confirm-overlay";
      overlay.innerHTML=`
        <div class="best-confirm-box">
          <div class="best-confirm-title">🏆 ベストアンサーに選ぶ</div>
          <div class="best-confirm-body">以下の返信をベストアンサーに選択しますか？</div>
          <div class="best-confirm-preview">${esc(replyBody)}</div>
          <div class="best-confirm-warn">⚠️ 一度選ぶと変更できません。</div>
          <div class="best-confirm-btns">
            <button id="bestConfirmOk" class="btn-p">✓ 選ぶ</button>
            <button id="bestConfirmCancel" class="btn-s">キャンセル</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      overlay.querySelector("#bestConfirmCancel").addEventListener("click",()=>overlay.remove());
      overlay.addEventListener("click",e2=>{if(e2.target===overlay)overlay.remove();});
      overlay.querySelector("#bestConfirmOk").addEventListener("click",async()=>{
        const okBtn=overlay.querySelector("#bestConfirmOk");
        okBtn.disabled=true;okBtn.textContent="保存中…";
        const{error}=await sb.from("threads").update({best_reply_id:rid}).eq("id",threadId);
        if(error){overlay.remove();alert("保存に失敗しました。");return;}
        overlay.remove();
        await createBestAnswerNotification(threadId,rid);
        const cached=S.threads.find(th2=>th2.id===threadId);
        if(cached)cached.best_reply_id=rid;
        t.best_reply_id=rid;
        dv.querySelectorAll(".btn-best").forEach(btn=>btn.remove());
        const targetCard=dv.querySelector(`.rcard[data-rid="${rid}"]`);
        if(targetCard){
          if(!targetCard.querySelector(".best-badge")){
            const badge=document.createElement("div");badge.className="best-badge";
            badge.textContent="🏆 ベストアンサー";
            targetCard.insertBefore(badge,targetCard.firstChild);
          }
          targetCard.classList.add("best");
        }
        await loadThreads();
      });
    });
  });

  function bindDetailReacts(){
    dv.querySelectorAll(".react-row").forEach(row=>{
      row.querySelectorAll(".rbtn").forEach(b=>{
        b.addEventListener("click",e=>{
          e.stopPropagation();if(!S.user)return;
          toggleReaction(b.dataset.tid,b.dataset.e,()=>{
            const d2=document.createElement("div");d2.innerHTML=buildReactFull(b.dataset.tid);
            row.replaceWith(d2.firstChild);bindDetailReacts();
          });
        });
      });
    });
  }
  bindDetailReacts();
  dv.querySelectorAll(".upg-link2").forEach(el2=>el2.addEventListener("click",()=>switchTab("account")));

  if(S.isStd){
    const rBodyEl=dv.querySelector("#rBody"),rCountEl=dv.querySelector("#rCount"),rMsgEl=dv.querySelector("#rMsg");
    rBodyEl?.addEventListener("input",e=>{if(rCountEl)rCountEl.textContent=e.target.value.length;});
    dv.querySelector("#btnReply")?.addEventListener("click",async()=>{
      const body=rBodyEl?.value?.trim();
      if(!body){msg(rMsgEl,"返信内容を入力してください。");return;}
      const btn=dv.querySelector("#btnReply");btn.disabled=true;
      const{data:rd,error}=await sb.from("replies").insert({thread_id:threadId,user_id:S.user.id,body}).select().single();
      btn.disabled=false;
      if(error){msg(rMsgEl,"送信に失敗しました。");return;}
      msg(rMsgEl,"返信しました！","ok");
      rBodyEl.value="";if(rCountEl)rCountEl.textContent="0";
      if(rd){
        await createNotification(threadId,rd.id,t.user_id);
        // 自分以外が返信した場合、送信者側のバッジは更新不要だが
        // スレッドオーナーが自分の場合はバッジ更新
        await loadNotifications();
      }
      setTimeout(()=>openDetail(threadId,type),800);
    });
  }
}

/* ===== ユーザープロフィールページ ===== */
async function openUserProfile(userId){
  $("#homeListView").style.display="none";
  $("#homeDetail").classList.remove("show");
  const up=$("#userProfilePage");up.classList.add("show");
  up.innerHTML=`<button class="back-btn" id="upBack">← 戻る</button><div class="loading">読み込み中…</div>`;
  up.querySelector("#upBack").addEventListener("click",showHomeList);

  // プロフィール取得
  const{data:prof}=await sb.from("profiles").select("*").eq("id",userId).single();
  // その人の投稿取得
  const{data:threads}=await sb.from("threads").select(`
    id,type,category,title,body,created_at,best_reply_id,user_id,
    profiles!user_id(display_name,age,work_style,marital_status,living_situation,avatar_url),
    replies!replies_thread_id_fkey(count)
  `).eq("user_id",userId).order("created_at",{ascending:false}).limit(50);

  const p={...prof,_uid:userId};
  const label=p.display_name||(p.age?`${p.age}歳`:"匿名");
  const isMe=S.user?.id===userId;
  const color=avc(userId);
  const init=label[0]||"?";

        <div class="attr-tags" style="margin-top:4px">${attrHtml(p)}</div>

    </div>

  if(!ts.length){
    html+=`<div class="empty"><div class="empty-h">まだ投稿がありません</div></div>`;
  }else{
    const posts=ts.filter(t=>t.type==="post");
    const questions=ts.filter(t=>t.type==="question");
    if(posts.length){
      html+=`<div class="sec-divider">つぶやき (${posts.length})</div>`;
      html+=`<div class="card-list" id="upPostList">`+posts.map(t=>cardHtml(t,false)).join("")+`</div>`;
    }
    if(questions.length){
      html+=`<div class="sec-divider">相談 (${questions.length})</div>`;
      html+=`<div class="card-list" id="upQList">`+questions.map(t=>cardHtml(t,false)).join("")+`</div>`;

  up.innerHTML=html;
  up.querySelector("#upBack2").addEventListener("click",showHomeList);

      openDetail(c.dataset.id,c.dataset.type);

  // リアクション
  const pids=(threads||[]).filter(t=>t.type==="post").map(t=>t.id);
  if(pids.length){
    await loadReactions(pids);

      const row=c.querySelector(".react-row-sm");
      if(row){const d=document.createElement("div");d.innerHTML=buildReactSm(tid);row.replaceWith(d.firstChild);}

/* ===== マイページ ===== */
async function renderMypage(){
  renderPostFormInHome();
  const wrap=$("#mypageWrap");
  wrap.innerHTML=`<div class="loading">読み込み中…</div>`;
  const{data:threads}=await sb.from("threads").select(`
    id,type,category,title,body,created_at,best_reply_id,user_id,
    profiles!user_id(display_name,age,work_style,marital_status,living_situation,avatar_url),
    replies!replies_thread_id_fkey(count)
  `).eq("user_id",S.user.id).order("created_at",{ascending:false}).limit(100);

  const ts=threads||[];
  const posts=ts.filter(t=>t.type==="post");
  const questions=ts.filter(t=>t.type==="question");

  // タブUI構築
  wrap.innerHTML=`
    <div class="mp-tabs">
      <button class="mp-tab active" data-pane="mpPanePost">つぶやき (${posts.length})</button>
      <button class="mp-tab" data-pane="mpPaneQuestion">相談 (${questions.length})</button>
    </div>
    <div id="mpPanePost" class="mp-pane active">
      ${posts.length
        ? `<div class="card-list">`+posts.map(t=>cardHtml(t,false)).join("")+`</div>`
        : `<div class="empty"><div class="empty-h">まだつぶやきがありません</div><p>上のフォームからつぶやいてみましょう。</p></div>`
      }
    </div>
    <div id="mpPaneQuestion" class="mp-pane">
      ${questions.length
        ? `<div class="card-list">`+questions.map(t=>cardHtml(t,false)).join("")+`</div>`
        : `<div class="empty"><div class="empty-h">まだ相談がありません</div><p>上のフォームから相談してみましょう。</p></div>`
      }
    </div>`;

  // タブ切替
  wrap.querySelectorAll(".mp-tab").forEach(btn=>{
    btn.addEventListener("click",()=>{
      wrap.querySelectorAll(".mp-tab").forEach(b=>b.classList.remove("active"));
      wrap.querySelectorAll(".mp-pane").forEach(p=>p.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById(btn.dataset.pane)?.classList.add("active");
    });
  });

  wrap.querySelectorAll(".post-card").forEach(c=>{
    c.addEventListener("click",e=>{
      if(e.target.closest(".del-btn")||e.target.closest(".rbtn-sm"))return;
      switchTab("home");
      setTimeout(()=>openDetail(c.dataset.id,c.dataset.type),80);
    });
  });
  wrap.querySelectorAll(".del-btn").forEach(b=>{
    b.addEventListener("click",async e=>{
      e.stopPropagation();
      await deleteThread(b.dataset.id,()=>renderMypage());
    });
  });
  const pids=posts.map(t=>t.id);
  if(pids.length){
    await loadReactions(pids);
    wrap.querySelectorAll(".post-card.is-post").forEach(c=>{
      const tid=c.dataset.id;
      const row=c.querySelector(".react-row-sm");
      if(row){const d=document.createElement("div");d.innerHTML=buildReactSm(tid);row.replaceWith(d.firstChild);}
    });
    bindReactsSm(wrap);
  }
}

/* ===== 削除 ===== */
async function deleteThread(threadId,onSuccess){
  if(!confirm("この投稿を削除しますか？\n紐づく返信もすべて削除されます。"))return;
  const{error}=await sb.from("threads").delete().eq("id",threadId).eq("user_id",S.user.id);
  if(error){alert("削除に失敗しました。");return;}
  await loadThreads();
  if(onSuccess)onSuccess();
  else{showHomeList();renderHomeList();}
}
async function deleteReply(replyId,threadId,type){
  if(!confirm("この返信を削除しますか？"))return;
  const{error}=await sb.from("replies").delete().eq("id",replyId).eq("user_id",S.user.id);
  if(error){alert("削除に失敗しました。");return;}
  await loadThreads();
  openDetail(threadId,type);
}

/* ===== 通知 ===== */
async function createNotification(threadId,replyId,threadOwnerId){
  let ownerId=threadOwnerId;
  if(!ownerId){
    const{data:th}=await sb.from("threads").select("user_id").eq("id",threadId).single();
    if(!th)return;
    ownerId=th.user_id;
  }
  if(ownerId===S.user.id)return;
  const payloads=[
    {user_id:ownerId,thread_id:threadId,reply_id:replyId,notif_type:"reply"},
    {user_id:ownerId,thread_id:threadId,reply_id:replyId},
    {user_id:ownerId,thread_id:threadId},
  ];
  for(const p of payloads){
    const{error}=await sb.from("notifications").insert(p);
    if(!error){
      console.log("createNotification ok:",Object.keys(p).join(","));
      return;
    }
    console.warn("createNotification failed:",error.code,error.message);
  }
}
async function createBestAnswerNotification(threadId,replyId){
  // 返信者のuser_idを取得
  const{data:r,error:re}=await sb.from("replies").select("user_id").eq("id",replyId).single();
  if(re||!r){console.error("bestAnswer: reply not found",re?.message);return;}
  if(r.user_id===S.user.id){console.log("bestAnswer: skip self");return;}
  // notificationsにinsert（フォールバック付き）
  const payloads=[
    {user_id:r.user_id,thread_id:threadId,reply_id:replyId,notif_type:"best_answer"},
    {user_id:r.user_id,thread_id:threadId,reply_id:replyId},
    {user_id:r.user_id,thread_id:threadId},
  ];
  for(const p of payloads){
    const{error}=await sb.from("notifications").insert(p);
    if(!error){
      console.log("bestAnswer notif success:",Object.keys(p).join(","));
      await loadNotifications();
      return;
    }
    console.warn("bestAnswer notif failed:",error.code,error.message);
  }
  console.error("bestAnswer notif: all payloads failed");
}

async function saveProfile(){
  const m=$("#profMsg");
  const displayName=$("#pDisplayName").value.trim();
  if(!displayName){msg(m,"表示名を入力してください。");return;}
  const ageRaw=parseInt($("#pAge").value);
  if($("#pAge").value.trim()!==""&&(isNaN(ageRaw)||ageRaw<18||ageRaw>100)){
    msg(m,"年齢は18〜100の範囲で入力してください。");return;
  }
  const age=(!isNaN(ageRaw)&&ageRaw>=18&&ageRaw<=100)?ageRaw:null;
  const selectedIcon=document.querySelector("input[name=iconPick]:checked")?.value||null;
  const upd={
    display_name:displayName,age,
    work_style:$("#pWork").value||null,
    marital_status:$("#pMarital").value||null,
    living_situation:$("#pLiving").value||null,
    bio:$("#pBio").value.trim()||null,
    ...(selectedIcon?{avatar_url:selectedIcon}:{})
  };
  const btn=$("#btnSaveProf");btn.disabled=true;
  const{error}=await sb.from("profiles").update(upd).eq("id",S.user.id);
  btn.disabled=false;
  if(error){msg(m,"保存に失敗しました。");return;}
  S.profile={...S.profile,...upd};
  msg(m,"保存しました！","ok");
}
async function changeEmail(){
  const m=$("#emailMsg"),ne=$("#emailNew").value.trim();
  if(!ne||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(ne)){msg(m,"正しいメールアドレスを入力してください。");return;}
  const btn=$("#btnEmail");btn.disabled=true;
  const{error}=await sb.auth.updateUser({email:ne},{emailRedirectTo:APP_URL});
  btn.disabled=false;
  if(error){msg(m,"変更に失敗しました。");return;}
  msg(m,"確認メールを送信しました。","ok");$("#emailNew").value="";
}
async function savePassword(){
  const m=$("#pwMsg"),p1=$("#pwN").value,p2=$("#pwN2").value;
  if(!p1){msg(m,"パスワードを入力してください。");return;}
  if(p1.length<8){msg(m,"8文字以上で入力してください。");return;}
  if(p1!==p2){msg(m,"パスワードが一致しません。");return;}
  const btn=$("#btnPw");btn.disabled=true;
  const{error}=await sb.auth.updateUser({password:p1});
  btn.disabled=false;
  if(error){msg(m,"設定に失敗しました。");return;}
  await sb.from("profiles").update({has_password:true}).eq("id",S.user.id);
  S.profile.has_password=true;msg(m,"パスワードを設定しました！","ok");
  $("#pwN").value="";$("#pwN2").value="";
}

/* ===== 課金 ===== */
async function loadBilling(){
  try{const r=await fetch(BILLING,{cache:"no-store"});S.billingCfg=await r.json();}catch(e){}
}
async function createCheckout(){
  const base=S.billingCfg?.stripe?.standard?.payment_link_url;
  if(!base){alert("課金設定の読み込みに失敗しました。");return;}
  const p=new URLSearchParams();
  if(S.user?.email)p.set("prefilled_email",S.user.email);
  if(S.user?.id)p.set("client_reference_id",S.user.id);
  location.href=base+(base.includes("?")?"&":"?")+p.toString();
}
async function openPortal(){
  try{
    const{data:sess}=await sb.auth.getSession();const token=sess?.session?.access_token;
    if(!token){alert("再ログインしてください。");return;}
    const r=await fetch(PORTAL,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${token}`},body:JSON.stringify({user_id:S.user.id,return_url:APP_URL})});
    const d=await r.json();
    if(d?.url)location.href=d.url;else alert("サブスクリプション管理ページを開けませんでした。");
  }catch(e){alert("エラーが発生しました。");}
}

/* ===== 通報 ===== */
function bindReport(btn){
  btn.addEventListener("click",e=>{
    e.stopPropagation();
    if(!S.isStd){alert("通報機能はStandardプランのみご利用いただけます。");return;}
    let snapshot="";
    if(btn.dataset.type==="reply") snapshot=btn.closest(".rcard")?.querySelector(".rbody")?.textContent||"";
    else snapshot=document.querySelector(".dbody")?.textContent||"";
    S.reportTarget={type:btn.dataset.type,id:btn.dataset.id,snapshot};
    $("#reportModal").classList.add("show");
    $("#reportReason").value="";msg($("#reportMsg"),"");
  });
}
$("#reportClose").addEventListener("click",()=>$("#reportModal").classList.remove("show"));
$("#btnReportCancel").addEventListener("click",()=>$("#reportModal").classList.remove("show"));
$("#btnReport").addEventListener("click",async()=>{
  const reason=$("#reportReason").value,m=$("#reportMsg");
  if(!reason){msg(m,"理由を選択してください。");return;}
  if(!S.reportTarget||!S.user)return;
  const btn=$("#btnReport");btn.disabled=true;
  const{error}=await sb.from("reports").insert({
    reporter_id:S.user.id,target_type:S.reportTarget.type,
    target_id:S.reportTarget.id,reason,
    content_snapshot:S.reportTarget.snapshot||null
  });
  btn.disabled=false;
  if(error){msg(m,"通報に失敗しました。");return;}
  msg(m,"通報しました。ご協力ありがとうございます。","ok");
  setTimeout(()=>{$("#reportModal").classList.remove("show");S.reportTarget=null;},1500);
});

$("#btnLogout").addEventListener("click",async()=>{await sb.auth.signOut();location.replace("/");});

/* ===== MAIN ===== */
async function main(){
  await Promise.all([loadBilling(),loadMasterData()]);
  const user=await getUser();
  if(!user){location.replace("/");return;}
  S.user=user;
  $("#userEmail").textContent=user.email||"";
  const prof=await loadProfile(user.id);
  S.profile=prof;
  const tier=String(prof?.tier||"free").toLowerCase();
  S.isStd=!!prof?.is_active&&tier==="standard";
  const badge=$("#planBadge");
  if(S.isStd){badge.textContent="Standard";badge.classList.add("std");}
  await Promise.all([loadThreads(),loadNotifications()]);
  switchTab("home");
}
main();
